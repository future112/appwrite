name: Obfuscate and Deploy Code

on:
  workflow_dispatch:
    inputs:
      uuid:
        description: 'UUID'
        required: true
        default: 'fd80f56e-93f3-4c85-b2a8-c77216c509a7'
      sub_name:
        description: 'SUB_NAME'
        required: false
        default: ''
      nserver:
        description: 'NSERVER (Nezha Server)'
        required: false
        default: ''
      nkey:
        description: 'NKEY (Nezha Key)'
        required: false
        default: ''
      tok:
        description: 'TOK (Argo Token)'
        required: false
        default: ''
      dom:
        description: 'DOM (Argo Domain)'
        required: false
        default: ''

permissions:
  contents: write
  actions: read

jobs:
  obfuscate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install javascript-obfuscator
        run: npm install -g javascript-obfuscator

      - name: Verify SOURCE_CODE Secret
        run: |
          if [ -z "${{ secrets.SOURCE_CODE }}" ]; then
            echo "Error: SOURCE_CODE secret is empty!"
            exit 1
          fi
          echo "SOURCE_CODE length: ${#SOURCE_CODE}"

      - name: Prepare source code
        env:
          SOURCE_CODE: ${{ secrets.SOURCE_CODE }}
        run: |
          # 從 Secret 生成源代碼文件，去掉多餘縮進
          cat > source.js << EOF
${{ secrets.SOURCE_CODE }}
EOF
          
          # 替換變量占位符
          sed -i "s/{{UUID}}/${{ github.event.inputs.uuid }}/g" source.js
          sed -i "s/{{SUB_NAME}}/${{ github.event.inputs.sub_name }}/g" source.js
          sed -i "s/{{NSERVER}}/${{ github.event.inputs.nserver }}/g" source.js
          sed -i "s/{{NKEY}}/${{ github.event.inputs.nkey }}/g" source.js
          sed -i "s/{{TOK}}/${{ github.event.inputs.tok }}/g" source.js
          sed -i "s/{{DOM}}/${{ github.event.inputs.dom }}/g" source.js

          # 查看生成結果
          echo "===== source.js preview ====="
          ls -lh source.js
          head -n 10 source.js

      - name: Obfuscate code
        run: |
          javascript-obfuscator source.js \
            --output obfuscated.js \
            --compact true \
            --control-flow-flattening true \
            --control-flow-flattening-threshold 0.75 \
            --dead-code-injection true \
            --dead-code-injection-threshold 0.4 \
            --debug-protection false \
            --disable-console-output false \
            --identifier-names-generator hexadecimal \
            --log false \
            --numbers-to-expressions true \
            --rename-globals false \
            --self-defending true \
            --simplify true \
            --split-strings true \
            --split-strings-chunk-length 10 \
            --string-array true \
            --string-array-calls-transform true \
            --string-array-encoding rc4 \
            --string-array-index-shift true \
            --string-array-rotate true \
            --string-array-shuffle true \
            --string-array-wrappers-count 2 \
            --string-array-wrappers-chained-calls true \
            --string-array-wrappers-parameters-max-count 4 \
            --string-array-wrappers-type variable \
            --string-array-threshold 0.75 \
            --transform-object-keys true \
            --unicode-escape-sequence false

          # 檢查混淆結果
          echo "===== obfuscated.js preview ====="
          ls -lh obfuscated.js
          head -n 10 obfuscated.js
          if [ ! -s obfuscated.js ]; then
            echo "Error: obfuscated.js is empty!"
            exit 1
          fi

      - name: Clean up temporary files
        run: rm -f source.js

      - name: Prepare release files
        run: |
          mkdir -p release
          cp obfuscated.js release/index.js

          # 確認 release/index.js 非空
          ls -lh release/index.js
          if [ ! -s release/index.js ]; then
            echo "Error: release/index.js is empty!"
            exit 1
          fi

          # README
          cat > release/README.md << EOF
# Obfuscated Code Build #${{ github.run_number }}

## 📦 Build Information

- **Build Number**: ${{ github.run_number }}
- **Generated**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
- **Workflow**: ${{ github.workflow }}

## ⚙️ Configuration

| Variable | Status |
|----------|--------|
| UUID | ✅ Configured |
| SUB_NAME | ${{ github.event.inputs.sub_name != '' && '✅ Configured' || '⚪ Not Set' }} |
| NSERVER | ${{ github.event.inputs.nserver != '' && '✅ Configured' || '⚪ Not Set' }} |
| NKEY | ${{ github.event.inputs.nkey != '' && '✅ Configured' || '⚪ Not Set' }} |
| TOK | ${{ github.event.inputs.tok != '' && '✅ Configured' || '⚪ Not Set' }} |
| DOM | ${{ github.event.inputs.dom != '' && '✅ Configured' || '⚪ Not Set' }}

## 🔒 Security Features

- ✅ High-strength obfuscation applied
- ✅ RC4 string encryption
- ✅ Control flow flattening
- ✅ Dead code injection
- ✅ Self-defending code

## 📥 Usage

Download \`index.js\` and deploy to your serverless platform.

---

Generated by GitHub Actions
EOF

          # config.json
          cat > release/config.json << EOF
{
  "build_number": ${{ github.run_number }},
  "generated_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
  "workflow_run_id": "${{ github.run_id }}",
  "variables_configured": {
    "UUID": true,
    "SUB_NAME": ${{ github.event.inputs.sub_name != '' && 'true' || 'false' }},
    "NSERVER": ${{ github.event.inputs.nserver != '' && 'true' || 'false' }},
    "NKEY": ${{ github.event.inputs.nkey != '' && 'true' || 'false' }},
    "TOK": ${{ github.event.inputs.tok != '' && 'true' || 'false' }},
    "DOM": ${{ github.event.inputs.dom != '' && 'true' || 'false' }}
  }
}
EOF

          # zip 包
          cd release
          zip -r ../obfuscated-build-${{ github.run_number }}.zip *
          cd ..

      - name: Generate release tag
        id: tag
        run: |
          TAG="build-$(date +%Y%m%d-%H%M%S)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Generated tag: $TAG"

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Build #${{ github.run_number }} - $(date +%Y-%m-%d)"
          body: |
            ## 🎉 Obfuscated Code Release
            
            **Build Number**: #${{ github.run_number }}
            **Generated**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
            
            ### 📦 Files Included
            
            - `index.js` - Obfuscated main code
            - `config.json` - Build configuration
            - `README.md` - Documentation
            - `obfuscated-build-${{ github.run_number }}.zip` - Complete package
          files: |
            release/index.js
            release/config.json
            release/README.md
            obfuscated-build-${{ github.run_number }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: obfuscated-code-${{ github.run_number }}
          path: release/
          retention-days: 30

      - name: Summary
        run: |
          echo "## 🎉 构建和发布完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Release 信息" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: \`${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Build**: #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Release URL**: ${{ steps.create_release.outputs.url }}" >> $GITHUB_STEP_SUMMARY
